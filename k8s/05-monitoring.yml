---
# Prometheus scrape config
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cogload
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: eep
        static_configs:
          - targets: ['eep:8080']
        metrics_path: /metrics
      - job_name: iep1-inference
        static_configs:
          - targets: ['iep1-inference:8000']
        metrics_path: /metrics
      - job_name: iep2-calibration
        static_configs:
          - targets: ['iep2-calibration:8001']
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cogload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cogload
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
# Grafana provisioning — datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cogload
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
# Grafana provisioning — dashboard provider
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: cogload
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: cogload
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# Grafana provisioning — dashboard JSON (same as local)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cogload
  namespace: cogload
data:
  cogload-serving.json: |
    {
      "title": "CogLoad Serving",
      "uid": "cogload-serving",
      "version": 1,
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "Throughput — requests / sec", "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps", "min": 0 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(eep_requests_total[1m])", "legendFormat": "EEP {{endpoint}} {{status}}", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(iep1_requests_total[1m])", "legendFormat": "IEP-1 {{status}}", "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(iep2_requests_total[1m])", "legendFormat": "IEP-2 {{status}}", "refId": "C" }
          ]
        },
        {
          "id": 2, "title": "Error Rate", "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(eep_requests_total{status=\"error\"}[1m]) / (rate(eep_requests_total[1m]) > 0)", "legendFormat": "EEP", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(iep1_requests_total{status=\"error\"}[1m]) / (rate(iep1_requests_total[1m]) > 0)", "legendFormat": "IEP-1", "refId": "B" }
          ]
        },
        {
          "id": 4, "title": "IEP-1 Latency — p50 / p95", "type": "timeseries",
          "gridPos": { "x": 0, "y": 7, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s", "min": 0 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, rate(iep1_request_latency_seconds_bucket[1m]))", "legendFormat": "p50", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.95, rate(iep1_request_latency_seconds_bucket[1m]))", "legendFormat": "p95", "refId": "B" }
          ]
        },
        {
          "id": 3, "title": "EEP Latency — p50 / p95", "type": "timeseries",
          "gridPos": { "x": 12, "y": 7, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s", "min": 0 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, rate(eep_request_latency_seconds_bucket[1m]))", "legendFormat": "p50 {{endpoint}}", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.95, rate(eep_request_latency_seconds_bucket[1m]))", "legendFormat": "p95 {{endpoint}}", "refId": "B" }
          ]
        },
        {
          "id": 6, "title": "Prediction Confidence Distribution (ML signal)", "type": "timeseries",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "min": 0 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "rate(iep1_prediction_confidence_bucket[5m])", "legendFormat": "le={{le}}", "refId": "A" }
          ]
        },
        {
          "id": 7, "title": "Input Drift Score — mean |z| (ML signal)", "type": "timeseries",
          "gridPos": { "x": 12, "y": 14, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "min": 0 }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, rate(iep1_input_drift_score_bucket[5m]))", "legendFormat": "p50", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.95, rate(iep1_input_drift_score_bucket[5m]))", "legendFormat": "p95", "refId": "B" }
          ]
        },
        {
          "id": 8, "title": "Uncalibrated Requests (last 5 min)", "type": "stat",
          "gridPos": { "x": 20, "y": 14, "w": 4, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":null},{"color":"yellow","value":5},{"color":"red","value":20}] } }, "overrides": [] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "increase(iep1_uncalibrated_requests_total[5m])", "legendFormat": "uncalibrated", "refId": "A" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cogload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-cogload
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cogload
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
