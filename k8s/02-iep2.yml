apiVersion: apps/v1
kind: Deployment
metadata:
  name: iep2-calibration
  namespace: cogload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iep2-calibration
  template:
    metadata:
      labels:
        app: iep2-calibration
    spec:
      containers:
        - name: iep2-calibration
          image: 879381262015.dkr.ecr.eu-central-1.amazonaws.com/cogload-iep2:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: iep2-calibration
  namespace: cogload
spec:
  selector:
    app: iep2-calibration
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
