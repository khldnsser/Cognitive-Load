# ServiceAccount is annotated with the IAM role ARN (IRSA).
# The role grants s3:GetObject on the model bucket — no static credentials needed.
# Role is created by scripts/create_iam_role.sh after cluster is up.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iep1-sa
  namespace: cogload
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::879381262015:role/cogload-iep1-s3-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iep1-inference
  namespace: cogload
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: iep1-inference
  template:
    metadata:
      labels:
        app: iep1-inference
    spec:
      serviceAccountName: iep1-sa
      containers:
        - name: iep1-inference
          image: 879381262015.dkr.ecr.eu-central-1.amazonaws.com/cogload-iep1:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_URI
              valueFrom:
                secretKeyRef:
                  name: cogload-model-secret
                  key: MODEL_URI
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60   # model download from S3 takes ~30-60s
            periodSeconds: 20
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: iep1-inference
  namespace: cogload
spec:
  selector:
    app: iep1-inference
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
